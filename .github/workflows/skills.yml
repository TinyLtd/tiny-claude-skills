name: skills

on:
  pull_request:
    paths: ["skills/**", "scripts/**", ".github/workflows/skills.yml"]
  push:
    branches: [main]

permissions:
  contents: write  # needed to publish the rolling release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      # Validate on every PR and every merge. Fails the job on bad frontmatter.
      - name: Validate SKILL.md frontmatter
        run: python scripts/validate_skills.py --manifest dist/index.json

      # Below here only runs on merge to main.
      - name: Build zips
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p dist
          for d in skills/*/; do
            name=$(basename "$d")
            (cd skills && zip -r "../dist/$name.zip" "$name")
          done
          # Note: no all-skills.zip bundle — claude.ai rejects zips containing
          # other zips, so per-skill zips are the only valid upload format.
          ls -la dist

      - name: Publish rolling 'latest' release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest dist/*.zip dist/index.json \
            --title "latest" \
            --notes "Auto-built skill zips. Stable URLs: .../releases/download/latest/<skill>.zip"
